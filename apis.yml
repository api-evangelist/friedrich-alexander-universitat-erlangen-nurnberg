apis:
  - aid: friedrich-alexander-universitat-erlangen-nurnberg:open-fau-rest
    name: OPEN FAU DSpace REST API
    description: >-
      OPEN FAU is the institutional open-access publication repository of FAU,
      built on DSpace 7.4. Its REST/HAL API exposes communities, collections,
      items, bitstreams, discovery/search and browse endpoints for harvesting
      and integrating repository content. Read access to public content is open;
      submission and management endpoints require authentication.
    humanURL: https://ub.fau.de/en/research/open-fau/
    baseURL: https://open.fau.de/server/api
    tags: [ Repository, Open Access, DSpace, Research, Library ]
    properties:
      - type: Documentation
        url: https://ub.fau.de/en/research/open-fau/
  - aid: friedrich-alexander-universitat-erlangen-nurnberg:open-fau-oai
    name: OPEN FAU OAI-PMH Interface
    description: >-
      OAI-PMH metadata harvesting interface for the OPEN FAU DSpace repository,
      supporting standard verbs (Identify, ListRecords, ListSets,
      GetRecord) for bulk metadata harvesting of FAU open-access publications.
      The legacy OPUS FAU OAI endpoint now redirects to OPEN FAU.
    humanURL: https://ub.fau.de/en/research/open-fau/
    baseURL: https://open.fau.de/server/oai/request
    tags: [ OAI-PMH, Metadata Harvesting, Open Access, Repository, Library ]
    properties:
      - type: Documentation
        url: https://ub.fau.de/en/research/open-fau/
  - aid: friedrich-alexander-universitat-erlangen-nurnberg:cris-converis-ws
    name: FAU CRIS Converis Public Web Service
    description: >-
      FAU CRIS is the university's research information system, built on Clarivate
      Converis, holding 146,000+ publications and 5,200+ research projects and
      syndicating data to 1,000+ websites. Converis provides public web-service
      endpoints under /converis/ws/public for reading info objects; on FAU's
      instance these paths respond but return HTTP 403 (access-restricted),
      so programmatic access is gated rather than openly documented.
    humanURL: https://cris.fau.de/
    tags: [ Research, CRIS, Converis, Web Service, Restricted ]
    properties:
      - type: Documentation
        url: https://www.fau.eu/research/services-for-researchers/research-information-system/
