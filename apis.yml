aid: friedrich-alexander-universitat-erlangen-nurnberg
name: Friedrich-Alexander-Universität Erlangen-Nürnberg
description: >-
  Friedrich-Alexander-Universität Erlangen-Nürnberg (FAU) is a public research
  university in Bavaria, Germany, ranked #224 in the QS World University Rankings
  2025. FAU does not operate a single consolidated developer portal, but several
  of its central services expose public, machine-readable interfaces. The
  University Library's OPEN FAU institutional repository runs on DSpace 7.4 and
  publishes a browsable REST/HAL API and an OAI-PMH metadata interface, while the
  FAU CRIS research information system (built on Clarivate Converis) exposes a
  public web-service path that is access-restricted on FAU's instance. Central IT
  (RRZE) and the Competence Center for Research Data and Information (CDI) maintain
  active public GitHub organizations and a self-hosted GitLab.
